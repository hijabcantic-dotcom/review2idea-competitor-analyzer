<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Review2Idea Minimal Wordmark Square</title>
  <desc id="desc">Square brand mark using the Review2Idea text-only wordmark.</desc>
  <defs>
    <linearGradient id="word2" x1="232" y1="195" x2="284" y2="245" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#41EAD4"/>
      <stop offset="1" stop-color="#B7FF5A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0B1020"/>
  <text x="50" y="286" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="840" letter-spacing="-3.5" fill="#F8FAFC">Review<tspan fill="url(#word2)">2</tspan>Idea</text>
</svg>
